name: directfast
description: "A production-grade mobile app to initiate chats on messaging platforms without saving contacts"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^17.2.1

  # Local Storage
  shared_preferences: ^2.2.3

  # Utilities
  url_launcher: ^6.3.0
  flutter_animate: ^4.5.0
  google_fonts: ^8.0.2

  # UI Components
  flutter_svg: ^2.0.10+1

  # Clipboard
  clipboard: ^3.0.14

  # Intl & Localization
  intl: ^0.20.2

  # QR Code
  qr_flutter: ^4.1.0

  # Image picker (for custom QR center image)
  image_picker: ^1.1.2

  # UUID
  uuid: ^4.3.3

  # Deep links
  app_links: ^7.0.0

  # Share
  share_plus: ^12.0.2

  # Image/Media Gallery Saver (for QR code saving)
  # Using 'gal' - modern, actively maintained, AGP 8.0+ compatible
  # Replaces legacy 'image_gallery_saver' which lacks namespace support
  gal: ^2.3.0

  # Crypto for encryption utilities
  crypto: ^3.0.3
  encrypt: ^5.0.3

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.9
  riverpod_generator: ^4.0.0+1

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

# Launcher Icons Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#0F0F23"
  adaptive_icon_foreground: "assets/images/logo.png"
