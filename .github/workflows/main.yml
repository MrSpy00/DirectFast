name: Flutter CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality-and-build:
    name: Analyze, Test, Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test --coverage

      - name: Build release APK
        run: flutter build apk --release

      - name: Prepare APK filename
        run: cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/DirectFast.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DirectFast-apk
          path: build/app/outputs/flutter-apk/DirectFast.apk

  release:
    name: Publish GitHub Release Asset
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: quality-and-build

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: DirectFast-apk
          path: release-assets

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/DirectFast.apk
